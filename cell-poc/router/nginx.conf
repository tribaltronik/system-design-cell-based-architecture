upstream cells {
    server cell-poc-cell-1-api-1:8000 max_fails=3 fail_timeout=30s;
    server cell-poc-cell-2-api-1:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    
    location / {
        proxy_pass http://cells;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /stats {
        stub_status on;
    }
}