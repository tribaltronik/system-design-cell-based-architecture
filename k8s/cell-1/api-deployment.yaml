apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-1-api
  namespace: cell-1
  labels:
    app: cell-1-api
    cell: cell-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cell-1-api
  template:
    metadata:
      labels:
        app: cell-1-api
        cell: cell-1
    spec:
      containers:
        - name: api
          image: cell-based-architecture-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: CELL_ID
              value: "cell-1"
            - name: POSTGRES_HOST
              value: "cell-1-postgres"
            - name: REDIS_HOST
              value: "cell-1-redis"
            - name: RABBITMQ_HOST
              value: "cell-1-rabbitmq"
            - name: DB_NAME
              value: "celldb"
            - name: DB_USER
              value: "celluser"
            - name: DB_PASS
              value: "cellpass123"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cell-1-api
  namespace: cell-1
spec:
  selector:
    app: cell-1-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
